<!DOCTYPE html>
<html>
  <head>
    <title>
      2D Game Test
    </title>
    <style>
        body { 
          margin: 0; 
          padding: 0; 
          overflow: hidden; 
          background: #ddd; 
        }
        canvas {
          image-rendering: pixelated;
          display: block; 
        }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="800" height = "600" ></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas")
      const ctx = canvas.getContext("2d")

      const stage0 = new Image()
      const stage1 = new Image()
      const stage2 = new Image()
      const stage3 = new Image()
      const stage4 = new Image()
      stage0.src = "images/stage0.png"
      stage1.src = "images/stage1.png"
      stage2.src = "images/stage2.png"
      stage3.src = "images/stage3.png"
      stage4.src = "images/stage4.png"

      const bgImg = new Image()
      bgImg.src = "images/bgImg.png"
      let pattern = null

      bgImg.onload = () => {
        pattern = ctx.createPattern(bgImg, 'repeat')
      }

      let squares = []
      
      function resizeCanvas() {
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight
      }

      resizeCanvas();

      let squareX = canvas.width / 2
      let squareY = canvas.height / 2

      window.addEventListener('mousedown', (event) => {
        let newX = event.clientX
        let newY = event.clientY
        let canPlace = true

        for (let i = 0; i < squares.length; i++) {
          let s = squares[i]
          let dx = Math.abs(newX - s.x)
          let dy = Math.abs(newY - s.y)
          let ageInSeconds = (Date.now() - s.createdAt) / 1000

          if (dx < 50 && dy < 50) {
            if (dx < 25 && dy < 25 && ageInSeconds < 50) {
              squares.splice(i, 1)
              i--
            }
            canPlace = false
            break
          }
        }
        if (canPlace) {
          squares.push({ x: event.clientX, y: event.clientY, createdAt: Date.now() })
        }
      })

      window.addEventListener('resize', resizeCanvas);

      function gameLoop() {
        if (pattern) {
          ctx.fillStyle = pattern
         ctx.fillRect(0, 0, canvas.width, canvas.height)
        } else {
          ctx.fillStyle = 'white'
          ctx.fillRect(0, 0, canvas.width, canvas.height)
        }

        const now = Date.now()

        for (let i = 0; i < squares.length; i++) {
          let s = squares[i]
          let ageInSeconds = (now - s.createdAt) / 1000
          if (ageInSeconds < 10) {
            ctx.drawImage(stage0, s.x - 25, s.y - 25, 48, 48)
          } else if (ageInSeconds < 20) {
            ctx.drawImage(stage1, s.x - 25, s.y - 25, 48, 48)
          } else if (ageInSeconds < 30) {
            ctx.drawImage(stage2, s.x - 25, s.y - 25, 48, 48)
          } else if (ageInSeconds < 40) {
            ctx.drawImage(stage3, s.x - 25, s.y - 25, 48, 48)
          } else if (ageInSeconds < 50) {
            ctx.drawImage(stage4, s.x - 25, s.y - 25, 48, 48)
          } else {
            squares.splice(i, 1)
            i--
            continue
          }
        }

        requestAnimationFrame(gameLoop)
      }

      gameLoop()
    </script>
  </body>
</html>
