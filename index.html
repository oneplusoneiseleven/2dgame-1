<!DOCTYPE html>
<html>
  <head>
    <title>
      2D Game Test
    </title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: #ddd; 
        }
        canvas { 
            display: block; 
        }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas" width="800" height = "600" ></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas")
      const ctx = canvas.getContext("2d")

      let squares = []
      
      function resizeCanvas() {
        canvas.width = window.innerWidth
        canvas.height = window.innerHeight
      }

      resizeCanvas();

      let squareX = canvas.width / 2
      let squareY = canvas.height / 2

      window.addEventListener('mousedown', (event) => {
        let newX = event.clientX
        let newY = event.clientY
        let canPlace = true

        for (i = 0; i < squares.length; i++) {
          let s = squares[i]
          let dx = Math.abs(newX - s.x)
          let dy = Math.abs(newY - s.y)

          if (dx < 50 && dy < 50) {
            canPlace = false
            break
          }
        }
        if (canPlace) {
          squares.push({ x: event.clientX, y: event.clientY, createdAt: Date.now() })
        }
      })

      window.addEventListener('resize', resizeCanvas);

      function gameLoop() {
        const now = Date.now()
        ctx.fillStyle = "white"
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        for (let i = 0; i < squares.length; i++) {
          let s = squares[i]
          let ageInSeconds = (now - s.createdAt) / 1000
          if (ageInSeconds < 10) {
            ctx.fillStyle = "blue"
          } else if (ageInSeconds < 20) {
            ctx.fillStyle = "green"
          } else {
            squares.splice(i, 1)
            i--
            continue
          }
          ctx.fillRect(s.x - 25, s.y - 25, 50, 50)
        }

        requestAnimationFrame(gameLoop)
      }

      gameLoop()
    </script>
  </body>
</html>
